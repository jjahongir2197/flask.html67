<!DOCTYPE html>
<html>
<head>
    <title>Contact Book</title>
</head>
<body>

    <h1>Contacts</h1>

    <form method="POST">

        <input type="text" name="name" placeholder="Name">
        <br><br>

        <input type="text" name="phone" placeholder="Phone">
        <br><br>

        <button type="submit">Save</button>

    </form>

    <hr>

    {% for c in contacts %}

        <h3>{{ c.name }}</h3>
        <p>{{ c.phone }}</p>

        <a href="/delete/{{ loop.index0 }}">Delete</a>
        <hr>

    {% endfor %}

</body>
</html>
